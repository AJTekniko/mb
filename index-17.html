<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Simon Memory Game</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&display=swap');

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            background: linear-gradient(135deg, #1e3c72 0%, #2a5298 100%);
            font-family: Arial, sans-serif;
            color: white;
            transition: background 0.5s ease;
        }

        body.game-over-state {
            background: linear-gradient(135deg, #8B0000 0%, #DC143C 100%);
        }

        .game-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 20px;
        }

        .header {
            display: flex;
            align-items: center;
            gap: 20px;
            width: 100%;
            justify-content: center;
            position: relative;
        }

        .info-display {
            font-size: 24px;
            font-weight: bold;
            margin-bottom: 10px;
        }

        .music-toggle {
            position: absolute;
            right: 20px;
            top: 20px;
        }

        .music-toggle button {
            padding: 10px 20px;
            font-size: 14px;
            background-color: #FF8C00;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            transition: background-color 0.3s;
        }

        .music-toggle button:hover {
            background-color: #FF7F00;
        }

        .music-toggle button.music-on {
            background-color: #4CAF50;
        }

        .music-toggle button.music-on:hover {
            background-color: #45a049;
        }

        .controls {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
        }

        button {
            padding: 10px 30px;
            font-size: 16px;
            background-color: #4CAF50;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            transition: background-color 0.3s;
        }

        button:hover {
            background-color: #45a049;
        }

        button:disabled {
            background-color: #cccccc;
            cursor: not-allowed;
        }

        .game-board {
            display: flex;
            align-items: center;
            gap: 30px;
            justify-content: center;
        }

        .side-column {
            display: flex;
            flex-direction: column;
            gap: 40px;
            justify-content: center;
            width: 100px;
            text-align: center;
        }

        .left-column {
            text-align: right;
        }

        .right-column {
            text-align: left;
        }

        .device-wrapper {
            position: relative;
            width: 500px;
            height: 500px;
        }

        .device-image {
            width: 100%;
            height: 100%;
            object-fit: contain;
        }

        .timer {
            position: absolute;
            top: 47%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 120px;
            height: 60px;
            background-color: #7fbc3f;
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Orbitron', monospace;
            font-size: 36px;
            font-weight: 900;
            color: #000;
            visibility: hidden;
            z-index: 10;
            letter-spacing: 1px;
        }

        .timer.visible {
            visibility: visible;
        }

        .side {
            position: absolute;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            border-radius: 50%;
            cursor: pointer;
            transition: all 0.1s;
            font-weight: bold;
            width: 100px;
            height: 100px;
        }

        .side-word {
            font-size: 18px;
            font-weight: bold;
        }

        .side-translation {
            font-size: 12px;
            opacity: 0.75;
            margin-top: 2px;
        }

        .side.active {
            transform: scale(1.1);
            box-shadow: 0 0 20px currentColor;
        }

        .purple-side {
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            color: #9500c6;
        }

        .purple-side.active {
            background-color: rgba(149, 0, 198, 0.6);
        }

        .yellow-side {
            top: 50%;
            right: 50px;
            transform: translateY(-50%);
            color: #f7f700;
        }

        .yellow-side.active {
            background-color: rgba(247, 247, 0, 0.6);
        }

        .cyan-side {
            bottom: 50px;
            left: 50%;
            transform: translateX(-50%);
            color: #00f7f7;
        }

        .cyan-side.active {
            background-color: rgba(0, 247, 247, 0.6);
        }

        .green-side {
            top: 50px;
            left: 50%;
            transform: translateX(-50%);
            color: #029433;
        }

        .green-side.active {
            background-color: rgba(2, 148, 51, 0.6);
        }

        .bottom-words {
            display: flex;
            gap: 80px;
            justify-content: center;
            margin-top: 20px;
        }

        .word-container {
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .input-section {
            display: flex;
            flex-direction: column;
            gap: 10px;
            width: 400px;
        }

        input {
            padding: 12px;
            font-size: 16px;
            border: 2px solid white;
            border-radius: 5px;
            text-align: center;
            color: white;
            background-color: rgba(255, 255, 255, 0.1);
        }

        input::placeholder {
            color: rgba(255, 255, 255, 0.7);
        }

        .game-status {
            font-size: 20px;
            margin-top: 10px;
            text-align: center;
            min-height: 30px;
        }

        .game-status.game-over {
            color: #FF6B6B;
            font-weight: bold;
        }

        .game-status.success {
            color: #4CAF50;
            font-weight: bold;
        }

        .game-over-modal {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0, 0, 0, 0.7);
            display: none;
            align-items: center;
            justify-content: center;
            z-index: 1000;
        }

        .game-over-modal.show {
            display: flex;
        }

        .game-over-content {
            background-color: rgba(0, 0, 0, 0.9);
            padding: 40px;
            border-radius: 10px;
            text-align: center;
            border: 3px solid #FF6B6B;
            max-width: 500px;
        }

        .game-over-content h1 {
            font-size: 48px;
            color: #FF6B6B;
            margin-bottom: 20px;
            text-transform: uppercase;
        }

        .stats {
            font-size: 24px;
            margin: 20px 0;
            line-height: 1.8;
        }

        .stat-label {
            color: #FFD700;
            font-weight: bold;
        }

        .stat-value {
            color: #4CAF50;
            font-size: 32px;
        }

        .game-over-content button {
            margin-top: 30px;
            padding: 15px 40px;
            font-size: 18px;
        }
    </style>
</head>
<body>
    <audio id="bgMusic" loop>
        <source src="https://raw.githubusercontent.com/AJTekniko/tgai/main/en/bg-music.mp3" type="audio/mpeg">
    </audio>

    <div class="game-container">
        <div class="header">
            <div class="info-display">
                <span>Level: <span id="levelDisplay">--</span></span>
            </div>
            <div class="music-toggle">
                <button id="musicToggle" class="music-on">🎵 Music On</button>
            </div>
        </div>

        <div class="controls">
            <button id="startBtn" onclick="startGame()">Start Game</button>
        </div>

        <div class="game-board">
            <div class="side-column left-column">
                <div class="word-container">
                    <div class="side-word" id="word-purple"></div>
                    <div class="side-translation" id="translation-purple"></div>
                </div>
            </div>

            <div class="device-wrapper">
                <img src="https://raw.githubusercontent.com/AJTekniko/tgaii/main/device.png" alt="Device" class="device-image">
                <div class="timer" id="timer">00:00</div>
                <div class="side purple-side" data-color="purple"></div>
                <div class="side yellow-side" data-color="yellow"></div>
                <div class="side cyan-side" data-color="cyan"></div>
                <div class="side green-side" data-color="green"></div>
            </div>

            <div class="side-column right-column">
                <div class="word-container">
                    <div class="side-word" id="word-yellow"></div>
                    <div class="side-translation" id="translation-yellow"></div>
                </div>
            </div>
        </div>

        <div class="bottom-words">
            <div class="word-container">
                <div class="side-word" id="word-green"></div>
                <div class="side-translation" id="translation-green"></div>
            </div>
            <div class="word-container">
                <div class="side-word" id="word-cyan"></div>
                <div class="side-translation" id="translation-cyan"></div>
            </div>
        </div>

        <div class="input-section">
            <input type="text" id="playerInput" placeholder="Type the word and press Enter to select a side" disabled>
            <div class="game-status" id="gameStatus"></div>
        </div>
    </div>

    <div class="game-over-modal" id="gameOverModal">
        <div class="game-over-content">
            <h1>Game Over!</h1>
            <div class="stats">
                <div><span class="stat-label">Final Level:</span> <span class="stat-value" id="finalLevel">0</span></div>
                <div><span class="stat-label">Highest Score:</span> <span class="stat-value" id="highestScore">0</span></div>
            </div>
            <button onclick="startGame(); closeGameOverModal();">Play Again</button>
        </div>
    </div>

    <script>
        const wordPool = {
            purple: ['I', 'a', 'and', 'as'],
            yellow: ['at', 'be', 'by', 'day'],
            cyan: ['do', 'first', 'for', 'from'],
            green: ['get', 'go', 'good', 'great']
        };

        const translations = {
            purple: ['yo', 'un', 'y', 'como'],
            yellow: ['a', 'ser', 'por', 'día'],
            cyan: ['hacer', 'primero', 'por, para', 'de'],
            green: ['obtener', 'ir', 'bueno, buena', 'excelente']
        };

        const colors = ['purple', 'yellow', 'cyan', 'green'];
        const frequencies = {
            purple: 200,
            yellow: 400,
            cyan: 600,
            green: 800,
            buzzer: 100
        };

        let sequence = [];
        let playerSequence = [];
        let level = 0;
        let gameActive = false;
        let currentWords = {};
        let currentTranslations = {};
        let usedWords = {
            purple: [],
            yellow: [],
            cyan: [],
            green: []
        };
        let highestScore = localStorage.getItem('simonHighScore') ? parseInt(localStorage.getItem('simonHighScore')) : 0;
        let musicEnabled = localStorage.getItem('simonMusicEnabled') !== 'false';
        let gameRunning = false;
        let timerInterval = null;
        let timeRemaining = 0;
        let timerActive = false;

        const audioContext = new (window.AudioContext || window.webkitAudioContext)();
        const bgMusicElement = document.getElementById('bgMusic');
        const musicToggleBtn = document.getElementById('musicToggle');
        const timerDisplay = document.getElementById('timer');

        // Normalize text by removing accents and standardizing apostrophes
        function normalizeText(text) {
            return text
                .toLowerCase()
                .normalize('NFD')
                .replace(/[\u0300-\u036f]/g, '') // Remove accent marks
                .replace(/[\u2018\u2019\u02BB\u02BC]/g, "'"); // Normalize apostrophes to straight quote
        }

        function playSound(frequency, duration = 500) {
            const oscillator = audioContext.createOscillator();
            const gainNode = audioContext.createGain();

            oscillator.connect(gainNode);
            gainNode.connect(audioContext.destination);

            oscillator.frequency.value = frequency;
            oscillator.type = 'sine';

            gainNode.gain.setValueAtTime(0.3, audioContext.currentTime);
            gainNode.gain.exponentialRampToValueAtTime(0.01, audioContext.currentTime + duration / 1000);

            oscillator.start(audioContext.currentTime);
            oscillator.stop(audioContext.currentTime + duration / 1000);
        }

        function playBoomSound() {
            const audio = new Audio('https://raw.githubusercontent.com/AJTekniko/tgai/main/en/boom.ogg');
            audio.volume = 0.7;
            audio.play();
        }

        function playBeepSound() {
            const audio = new Audio('https://raw.githubusercontent.com/AJTekniko/tgaii/main/beep.ogg');
            audio.volume = 0.6;
            audio.play();
        }

        function playWordAudio(word) {
            const filename = word.toLowerCase().replace(/[\s']/g, '');
            const audio = new Audio(`https://raw.githubusercontent.com/AJTekniko/tgai/main/en/${filename}.ogg`);
            audio.volume = 0.8;
            audio.play();
        }

        function calculateTimerDuration(lvl) {
            if (lvl === 1) return 5;
            return Math.ceil(lvl / 0.40);
        }

        function formatTime(seconds) {
            const mins = Math.floor(seconds / 60);
            const secs = seconds % 60;
            return `${mins.toString().padStart(2, '0')}:${secs.toString().padStart(2, '0')}`;
        }

        function startTimer() {
            timeRemaining = calculateTimerDuration(level);
            timerActive = true;
            timerDisplay.classList.add('visible');
            timerDisplay.textContent = formatTime(timeRemaining);

            if (timerInterval) clearInterval(timerInterval);

            timerInterval = setInterval(() => {
                timeRemaining--;
                timerDisplay.textContent = formatTime(timeRemaining);

                if (timeRemaining > 0) {
                    playBeepSound();
                } else if (timeRemaining === 0) {
                    clearInterval(timerInterval);
                    timerActive = false;
                    playBoomSound();
                    stopBackgroundMusic();
                    gameActive = false;
                    gameRunning = false;
                    document.getElementById('playerInput').disabled = true;
                    document.getElementById('gameStatus').classList.add('game-over');
                    document.getElementById('gameStatus').textContent = `Game Over! Time's up!`;
                    document.body.classList.add('game-over-state');

                    setTimeout(() => {
                        showGameOverModal();
                    }, 500);
                }
            }, 1000);
        }

        function stopTimer() {
            if (timerInterval) {
                clearInterval(timerInterval);
                timerInterval = null;
            }
            timerActive = false;
            timerDisplay.classList.remove('visible');
        }

        function lightUpSide(color) {
            const element = document.querySelector(`.${color}-side`);
            element.classList.add('active');
            playSound(frequencies[color]);

            setTimeout(() => {
                element.classList.remove('active');
            }, 500);
        }

        function getRandomWord(color) {
            const available = wordPool[color].filter(w => !usedWords[color].includes(w));

            if (available.length === 0) {
                usedWords[color] = [];
                return wordPool[color][Math.floor(Math.random() * wordPool[color].length)];
            }

            const word = available[Math.floor(Math.random() * available.length)];
            usedWords[color].push(word);
            return word;
        }

        function getTranslation(color, word) {
            const index = wordPool[color].indexOf(word);
            return index !== -1 ? translations[color][index] : '';
        }

        function setupWords() {
            currentWords = {
                purple: getRandomWord('purple'),
                yellow: getRandomWord('yellow'),
                cyan: getRandomWord('cyan'),
                green: getRandomWord('green')
            };

            currentTranslations = {
                purple: getTranslation('purple', currentWords.purple),
                yellow: getTranslation('yellow', currentWords.yellow),
                cyan: getTranslation('cyan', currentWords.cyan),
                green: getTranslation('green', currentWords.green)
            };

            document.getElementById('word-purple').textContent = currentWords.purple;
            document.getElementById('translation-purple').textContent = currentTranslations.purple;
            document.getElementById('word-yellow').textContent = currentWords.yellow;
            document.getElementById('translation-yellow').textContent = currentTranslations.yellow;
            document.getElementById('word-cyan').textContent = currentWords.cyan;
            document.getElementById('translation-cyan').textContent = currentTranslations.cyan;
            document.getElementById('word-green').textContent = currentWords.green;
            document.getElementById('translation-green').textContent = currentTranslations.green;
        }

        function playSequence() {
            gameActive = false;
            let delay = 1000;

            sequence.forEach((color, index) => {
                setTimeout(() => {
                    lightUpSide(color);
                }, delay + index * 800);
            });

            setTimeout(() => {
                gameActive = true;
                playerSequence = [];
                document.getElementById('playerInput').value = '';
                document.getElementById('playerInput').disabled = false;
                document.getElementById('playerInput').focus();
                // Start timer after sequence is shown
                startTimer();
            }, delay + sequence.length * 800 + 500);
        }

        function handleKeyPress(event) {
            if (event.key !== 'Enter' || !gameActive) return;

            event.preventDefault();
            const input = document.getElementById('playerInput').value.trim();

            if (!input) {
                return;
            }

            const normalizedInput = normalizeText(input);
            let matchedColor = null;

            for (const [color, word] of Object.entries(currentWords)) {
                if (normalizeText(word) === normalizedInput) {
                    matchedColor = color;
                    break;
                }
            }

            if (!matchedColor) {
                playBoomSound();
                stopTimer();
                stopBackgroundMusic();
                gameActive = false;
                gameRunning = false;
                document.getElementById('playerInput').disabled = true;
                document.getElementById('gameStatus').classList.add('game-over');
                document.getElementById('gameStatus').textContent = `Game Over! Word not recognized.`;
                document.body.classList.add('game-over-state');

                setTimeout(() => {
                    showGameOverModal();
                }, 500);
                return;
            }

            const expectedColor = sequence[playerSequence.length];

            if (matchedColor !== expectedColor) {
                playBoomSound();
                stopTimer();
                stopBackgroundMusic();
                gameActive = false;
                gameRunning = false;
                document.getElementById('playerInput').disabled = true;
                document.getElementById('gameStatus').classList.add('game-over');
                document.getElementById('gameStatus').textContent = `Game Over! Wrong sequence.`;
                document.body.classList.add('game-over-state');

                setTimeout(() => {
                    showGameOverModal();
                }, 500);
                return;
            }

            // Play word audio
            playWordAudio(currentWords[matchedColor]);

            lightUpSide(matchedColor);
            playerSequence.push(matchedColor);
            document.getElementById('playerInput').value = '';

            if (playerSequence.length === sequence.length) {
                stopTimer();
                document.getElementById('gameStatus').classList.remove('game-over');
                document.getElementById('gameStatus').classList.add('success');
                document.getElementById('gameStatus').textContent = `Perfect! Level ${level} complete!`;

                gameActive = false;
                document.getElementById('playerInput').disabled = true;

                setTimeout(() => {
                    nextLevel();
                }, 1500);
            }
        }

        function nextLevel() {
            level++;
            document.getElementById('levelDisplay').textContent = level;
            document.getElementById('gameStatus').textContent = '';
            document.getElementById('gameStatus').classList.remove('success', 'game-over');

            const randomColor = colors[Math.floor(Math.random() * colors.length)];
            sequence.push(randomColor);

            setupWords();
            playSequence();
        }

        function showGameOverModal() {
            if (level > highestScore) {
                highestScore = level;
                localStorage.setItem('simonHighScore', highestScore);
            }

            document.getElementById('finalLevel').textContent = level;
            document.getElementById('highestScore').textContent = highestScore;
            document.getElementById('gameOverModal').classList.add('show');
        }

        function closeGameOverModal() {
            document.getElementById('gameOverModal').classList.remove('show');
            document.body.classList.remove('game-over-state');
        }

        function startGame() {
            closeGameOverModal();
            sequence = [];
            playerSequence = [];
            level = 0;
            gameActive = false;
            gameRunning = true;
            stopTimer();

            document.getElementById('playerInput').value = '';
            document.getElementById('playerInput').disabled = true;
            document.getElementById('gameStatus').textContent = '';
            document.getElementById('gameStatus').classList.remove('game-over', 'success');

            if (musicEnabled) {
                playBackgroundMusic();
            }

            nextLevel();
        }

        function playBackgroundMusic() {
            bgMusicElement.currentTime = 0;
            bgMusicElement.play();
        }

        function stopBackgroundMusic() {
            bgMusicElement.pause();
            bgMusicElement.currentTime = 0;
        }

        function toggleMusic() {
            musicEnabled = !musicEnabled;
            localStorage.setItem('simonMusicEnabled', musicEnabled);

            if (musicEnabled) {
                musicToggleBtn.textContent = '🎵 Music On';
                musicToggleBtn.classList.add('music-on');
                if (gameRunning) {
                    playBackgroundMusic();
                }
            } else {
                musicToggleBtn.textContent = '🔇 Music Off';
                musicToggleBtn.classList.remove('music-on');
                stopBackgroundMusic();
            }
        }

        // Initialize music button state
        function initializeMusicButton() {
            if (musicEnabled) {
                musicToggleBtn.textContent = '🎵 Music On';
                musicToggleBtn.classList.add('music-on');
            } else {
                musicToggleBtn.textContent = '🔇 Music Off';
                musicToggleBtn.classList.remove('music-on');
            }
        }

        document.getElementById('playerInput').addEventListener('keypress', handleKeyPress);
        musicToggleBtn.addEventListener('click', toggleMusic);

        // Initialize on page load
        initializeMusicButton();
    </script>
</body>
</html>
